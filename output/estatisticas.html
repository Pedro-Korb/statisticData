<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Dados Estatísticos</title>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
   <style>
      .header-resumo {
         background: linear-gradient(135deg, #1f2235, #181a2a);
         padding: 35px;
         border-radius: 18px;
         margin-bottom: 40px;
         display: flex;
         justify-content: space-between;
         align-items: center;
         box-shadow: 0 15px 40px rgba(0,0,0,0.6);
         border: 1px solid rgba(255,255,255,0.05);
         font-family: 'Inter', sans-serif;
      }

      .header-info h1 {
         margin: 8px 0 0 0;
         font-size: 30px;
         font-weight: 600;
         color: #ffffff;
         letter-spacing: -0.5px;
      }

      .header-info .label {
         font-size: 13px;
         text-transform: uppercase;
         letter-spacing: 1.5px;
         color: #6c7293;
      }

      .header-metricas {
         display: flex;
         gap: 50px;
      }

      .metrica {
         text-align: center;
      }

      .metrica .numero {
         font-size: 34px;
         font-weight: 700;
         display: block;
         color: #4facfe;
      }

      .metrica .descricao {
         font-size: 13px;
         margin-top: 6px;
         color: #8f96b2;
         letter-spacing: 0.5px;
      }
   </style>

</head>
<body>
   <div>
<div class="header-resumo">
<div class="header-info">
<span class="label">
Arquivo</span>
<h1>
student_productivity.csv</h1>
</div>
<div class="header-metricas">
<div class="metrica">
<span class="numero">
5000</span>
<span class="descricao">
Linhas</span>
</div>
<div class="metrica">
<span class="numero">
21</span>
<span class="descricao">
Colunas</span>
</div>
</div>
</div>
</div>

</body>
</html>
